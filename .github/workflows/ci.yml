name: CI

on:
  push:
    branches: ['*']

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: '8'
      - run: npm install
      - run: npm run build
      - run: npm run testonly
